services:
  cockroachdb:
    image: cockroachdb/cockroach:v24.3.3
    command: start-single-node --insecure --store=attrs=ssd,path=/cockroach/cockroach-data
    volumes:
      - ./cockroach-data:/cockroach/cockroach-data
    ports:
      - "26257:26257"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "/cockroach/cockroach", "sql", "--insecure", "--host=localhost:26257", "--execute=SELECT 1;"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.32.1
    depends_on:
      cockroachdb:
        condition: service_healthy
    restart: on-failure
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address root@cockroachdb:26257 &&
        exec /nakama/nakama --config /nakama/data/config.yml --database.address root@cockroachdb:26257
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./nakama/build:/nakama/data/modules
      - ./deploy/config.yml:/nakama/data/config.yml

